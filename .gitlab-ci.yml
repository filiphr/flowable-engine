stages: [build]

cache:
  key: ${CI_JOB_NAME}-m2
  paths:
    - .m2/repository

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2 -Xmx3072m -Xms1024m -Djava.awt.headless=true"

java-8:
  stage: build
#  image: adoptopenjdk/openjdk11:jdk-11.0.2.9
  image: adoptopenjdk/openjdk8:jdk8u202-b08
  before_script:
    - ls -al $JAVA_HOME/lib
    - touch $JAVA_HOME/lib/fontconfig.properties
    - echo "version=1" > $JAVA_HOME/lib/fontconfig.properties
    - echo "sequence.allfonts=default" >> $JAVA_HOME/lib/fontconfig.properties
    - cat $JAVA_HOME/lib/fontconfig.properties
    - ls -al $JAVA_HOME/lib
  script: ./mvnw test -Pdistro,errorLogging -DskipTests=false -B -V
  artifacts:
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"
        - "*/*/target/surefire-reports/TEST-*.xml"
        - "*/*/*/target/surefire-reports/TEST-*.xml"
        - "*/*/*/*/target/surefire-reports/TEST-*.xml"
